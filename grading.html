<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Grading Sheet</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --panel-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 1rem;
            text-align: center;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar / Palette */
        .sidebar {
            width: 250px;
            background-color: var(--panel-bg);
            border-right: 1px solid #ddd;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
            overflow-y: auto;
        }

        .tool-section h3 {
            margin-top: 0;
            font-size: 1rem;
            color: var(--primary-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 5px;
        }

        .symbol-palette {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .symbol-item {
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 10px;
            text-align: center;
            cursor: grab;
            background: #fafafa;
            transition: all 0.2s;
        }

        .symbol-item:hover {
            background: #eef;
            border-color: var(--accent-color);
        }

        .symbol-icon {
            width: 30px;
            height: 30px;
            margin: 0 auto 5px;
            display: block;
        }

        /* Canvas Area */
        .canvas-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #e0e0e0;
            position: relative;
        }

        canvas {
            background-color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: crosshair;
        }

        /* Controls Panel */
        .controls {
            padding: 15px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .control-group {
            margin-bottom: 10px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        input[type="range"] {
            width: 100%;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-top: 5px;
        }

        .btn-danger {
            background-color: #e74c3c;
        }

        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            body {
                height: auto;
                min-height: 100vh;
            }
            .main-container {
                flex-direction: column;
                overflow: visible;
            }
            .sidebar {
                width: 100%;
                order: 2;
                box-sizing: border-box;
            }
            .canvas-area {
                order: 1;
                padding: 10px;
            }
            canvas {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Diamond Grading Report</h1>
</header>

<div class="main-container">
    <!-- Sidebar: Palette & Controls -->
    <div class="sidebar">
        
        <div class="tool-section">
            <h3>Inclusions (Drag to Chart)</h3>
            <div class="symbol-palette">
                <!-- Draggable Items -->
                <div class="symbol-item" draggable="true" data-type="crystal" title="Drag or Click to add">
                    <svg class="symbol-icon" viewBox="0 0 30 30">
                        <circle cx="15" cy="15" r="12" fill="none" stroke="red" stroke-width="2"/>
                    </svg>
                    <small>Crystal</small>
                </div>
                <div class="symbol-item" draggable="true" data-type="feather" title="Drag or Click to add">
                    <svg class="symbol-icon" viewBox="0 0 30 30">
                        <path d="M5 5 Q15 10 25 25 M5 5 L8 8 M12 12 L15 15 M20 20 L23 23" fill="none" stroke="red" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <small>Feather</small>
                </div>
                <div class="symbol-item" draggable="true" data-type="cloud" title="Drag or Click to add">
                    <svg class="symbol-icon" viewBox="0 0 30 30">
                        <circle cx="15" cy="15" r="12" fill="none" stroke="red" stroke-width="2" stroke-dasharray="3 2"/>
                    </svg>
                    <small>Cloud</small>
                </div>
                <div class="symbol-item" draggable="true" data-type="pinpoint" title="Drag or Click to add">
                    <svg class="symbol-icon" viewBox="0 0 30 30">
                        <circle cx="15" cy="15" r="3" fill="red"/>
                    </svg>
                    <small>Pinpoint</small>
                </div>
                <div class="symbol-item" draggable="true" data-type="group_pinpoints" title="Drag or Click to add">
                    <svg class="symbol-icon" viewBox="0 0 30 30">
                        <circle cx="10" cy="10" r="2" fill="red"/>
                        <circle cx="20" cy="10" r="2" fill="red"/>
                        <circle cx="15" cy="18" r="2" fill="red"/>
                        <circle cx="10" cy="24" r="2" fill="red"/>
                        <circle cx="22" cy="22" r="2" fill="red"/>
                    </svg>
                    <small>Group of Pinpoints</small>
                </div>
                <div class="symbol-item" draggable="true" data-type="knot" title="Drag or Click to add">
                    <svg class="symbol-icon" viewBox="0 0 30 30">
  <path  d="M15,5 L25,25 L5,25 Z"fill="none" stroke="red" stroke-width="2" stroke-dasharray="3 2"></path>
  <path  d="M14,12 V21 Z M14,16.5 L17.5,12 Z M14,16.5 L17.5,21 Z" stroke="red"></path>
</svg>
                        <small>Knot</small>
                </div>
                <div class="symbol-item" draggable="true" data-type="cavity" title="Drag or Click to add">
                    <svg class="symbol-icon" viewBox="0 0 30 30">
                        <rect x="5" y="5" width="20" height="20" fill="none" stroke="red" stroke-width="2"/>
                        <path d="M5 5 L25 25 M12 5 L25 18 M5 12 L18 25" stroke="red" stroke-width="1"/>
                    </svg>
                    <small>Cavity</small>
                </div>
                <div class="symbol-item" draggable="true" data-type="chip" title="Drag or Click to add">
                    <svg class="symbol-icon" viewBox="0 0 30 30">
                        <path d="M5 10 Q15 25 25 10 Z" fill="none" stroke="red" stroke-width="2"/>
                    </svg>
                    <small>Chip</small>
                </div>
                <div class="symbol-item" draggable="true" data-type="laser_drill" title="Drag or Click to add">
                    <svg class="symbol-icon" viewBox="0 0 30 30">
                        <circle cx="15" cy="15" r="10" fill="none" stroke="red" stroke-width="2"/>
                        <circle cx="15" cy="15" r="3" fill="red"/>
                    </svg>
                    <small>Laser Drill Hole</small>
                </div>
                <div class="symbol-item" draggable="true" data-type="bearded_girdle" title="Drag or Click to add">
                    <svg class="symbol-icon" viewBox="0 0 30 30">
                        <path d="M5 10 L5 20 M10 10 L10 20 M15 10 L15 20 M20 10 L20 20 M25 10 L25 20" stroke="red" stroke-width="2"/>
                    </svg>
                    <small>Bearded Girdle</small>
                </div>
            </div>
        </div>

        <div class="tool-section">
            <h3>Edit Selected</h3>
            <div class="controls">
                <div class="control-group">
                    <label>Rotation (<span id="rot-val">0</span>°)</label>
                    <input type="range" id="rotation" min="0" max="360" value="0" disabled>
                </div>
                <div class="control-group">
                    <label>Scale (<span id="scale-val">1.0</span>x)</label>
                    <input type="range" id="scale" min="0.5" max="3.0" step="0.1" value="1" disabled>
                </div>
                <button id="delete-btn" class="btn btn-danger" disabled>Delete Selected</button>
            </div>
        </div>

        <div class="tool-section">
            <button id="clear-all" class="btn" style="background-color: #7f8c8d;">Clear Chart</button>
            <button id="save-btn" class="btn" style="margin-top: 10px;">Download Image</button>
        </div>
    </div>

    <!-- Main Canvas -->
    <div class="canvas-area">
        <canvas id="gradingCanvas" width="800" height="600"></canvas>
    </div>
</div>

<script>
    /**
     * Diamond Grading Application Logic
     */
    const canvas = document.getElementById('gradingCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const rotationInput = document.getElementById('rotation');
    const scaleInput = document.getElementById('scale');
    const rotValDisplay = document.getElementById('rot-val');
    const scaleValDisplay = document.getElementById('scale-val');
    const deleteBtn = document.getElementById('delete-btn');
    const clearBtn = document.getElementById('clear-all');
    const saveBtn = document.getElementById('save-btn');

    // State
    let inclusions = []; // Array to store inclusion objects
    let selectedInclusion = null;
    let dragAction = null; // 'move', 'rotate', 'resize', 'pinch'
    let dragStart = { x: 0, y: 0, val: 0 }; 
    let initialPinchDist = 0;
    let initialPinchAngle = 0;
    let potentialDeselect = false;

    // --- 1. Drawing The Diamond Template (from SVG) ---
    let diamondTemplateImage = null;
    const svgTemplateData = `

            <path d="m22.921 374.274 6.855-33.189 7.042-18.779 11.72-29.027 8.852-17.885 19.539-28.387 20.082 29.477 19.665 44.924 6.504 19.692 6.454 33.93-33.736-7.005-20.046-5.961-26.882-11.365-18.966-9.393-27.651-19.539 27.469-18.99 18.787-9.754 28.869-11.549 18.775-5.595 32.455-7.377-5.346 34.477-6.685 18.794-11.54 28.307-8.673 18.069-19.714 28.005-20.263-28.185-8.312-17.707-11.361-27.594-6.503-19.509-5.897-34.269 33.536 6.264 20.775 6.324 25.796 11.364 18.782 8.849 27.643 19.535-27.638 19.898-18.609 9.033L76.743 361.7l-19.323 6.321-34.655 7.004zm.999.207-.499-.104-.101-.499 33.869-6.845.101.499-.159-.484 19.277-6.308.158.485-.194-.469 27.924-11.531.194.472-.222-.459 18.556-9.009.223.459-.299-.412 27.024-19.458.298.413-.294.416-27.024-19.096.295-.416-.217.461-18.736-8.828.217-.461-.206.467-25.762-11.35.206-.467-.149.487-20.718-6.305.149-.487-.094.5-32.788-6.125.094-.501.502-.086 5.765 33.508-.502.087.483-.161 6.486 19.457-.483.162.471-.194 11.35 27.563-.471.194.462-.216 8.286 17.655-.462.215.414-.297 19.818 27.563-.414.297-.417-.29 19.276-27.384.418.294-.461-.222 8.647-18.014.46.219-.471-.191 11.529-28.284.472.191-.479-.169 6.665-18.736.479.17-.502-.078 5.224-33.689.503.078.113.496-31.708 7.206-.112-.496.145.489-18.735 5.585-.146-.489.19.473-28.825 11.53-.189-.473.234.451-18.736 9.729-.234-.452.289.419-26.843 18.556-.289-.419.295-.416 27.023 19.095-.294.416.225-.457 18.917 9.368-.226.457.199-.469 26.843 11.35-.199.472.145-.491 19.997 5.945-.145.49.104-.499 32.968 6.845-.104.499-.5.095-6.305-33.15.5-.094-.484.16-6.486-19.636.484-.163-.467.207-19.637-44.859.467-.204-.421.286-19.636-28.824.421-.287.419.289-19.096 27.744-.42-.289.457.226-8.828 17.834-.457-.225.473.191-11.71 29.006-.473-.191.477.178-7.026 18.735-.477-.178.499.104z"/>

            <path d="m109.327 490.089 43.508 13.659-45.142 12.9-.14-.49.445-.247 22.563 40.815-40.819-22.467.246-.447.487.15-13.47 43.683-12.998-44.139.489-.145.248.447-40.638 22.659 22.197-40.553.446.244-.156.484L2.822 502.52l44.692-12.434.137.49-.451.238-21.821-41.395 39.374 23.062-.258.438-.484-.157 14.392-44.017 12.435 44.036-.49.138-.244-.446 40.185-21.774-20.663 40.109-.452-.231zm-.884.791 20.184-39.182.454.234.243.447-39.294 21.292-12.153-43.041.489-.138.485.159-14.068 43.027-38.379-22.477.258-.441.45-.237 21.283 40.375-43.666 12.148-.137-.491.156-.485 42.742 13.792-21.644 39.543-.446-.245-.249-.443 39.654-22.111 12.701 43.129-.489.145-.487-.151 13.157-42.663 39.821 21.921-.245.443-.446.248-22.019-39.835 44.123-12.606.14.491-.153.487-41.885-13.153z"/>
            <path d="M145.3 475.2 L9.3 530.8 M145.1 532.1 L9.7 474.7 M104.9 571.3 L50.2 435.2 M48.7 571.1 L105.9 435.7"/>
        </g>
    </svg>
    `;

    function loadAndDrawTemplate() {
        const img = new Image();
        const svgBlob = new Blob([svgTemplateData], {type: 'image/svg+xml;charset=utf-8'});
        const url = URL.createObjectURL(svgBlob);

        img.onload = function() {
            diamondTemplateImage = img;
            URL.revokeObjectURL(url);
            render(); // Re-render now that the image is loaded
        }
        img.src = url;
    }

    function drawDiamondTemplate() {
        if (diamondTemplateImage) {
            const imgWidth = diamondTemplateImage.width;
            const imgHeight = diamondTemplateImage.height;
            const diagramHeight = imgHeight / 2;
            
            const scale = 1.8;
            const destWidth = imgWidth * scale;
            const destHeight = diagramHeight * scale;

            // Draw Crown View (Top half of SVG)
            const crownX = 200;
            const crownY = 300;
            ctx.drawImage(
                diamondTemplateImage,
                0, 0, imgWidth, diagramHeight, // Source rect (top half)
                crownX - destWidth / 2, crownY - destHeight / 2, destWidth, destHeight // Dest rect
            );
            ctx.fillStyle = "#333";
            ctx.font = "16px Arial";
            ctx.textAlign = "center";
            ctx.fillText("Crown View", crownX, crownY + destHeight / 2 + 20);

            // Draw Pavilion View (Bottom half of SVG)
            const pavX = 600;
            const pavY = 300;
            ctx.drawImage(
                diamondTemplateImage,
                0, diagramHeight, imgWidth, diagramHeight, // Source rect (bottom half)
                pavX - destWidth / 2, pavY - destHeight / 2, destWidth, destHeight // Dest rect
            );
            ctx.fillText("Pavilion View", pavX, pavY + destHeight / 2 + 20);
            ctx.textAlign = "left"; // Reset for other text
        }
    }

    // --- 2. Inclusion Class & Drawing ---
    class Inclusion {
        constructor(x, y, type) {
            this.x = x;
            this.y = y;
            this.type = type;
            this.rotation = 0; // Degrees
            this.scale = 1;
            this.width = 40; // Base size
            this.height = 40;
            this.id = Date.now() + Math.random();
        }

        draw(ctx, isSelected) {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation * Math.PI / 180);
            ctx.scale(this.scale, this.scale);

            // Draw Symbol based on type
            ctx.strokeStyle = 'red';
            ctx.fillStyle = 'red';
            ctx.lineWidth = 2 / this.scale;

            switch (this.type) {
                case 'crystal':
                    ctx.beginPath();
                    ctx.arc(0, 0, 15, 0, Math.PI * 2);
                    ctx.stroke();
                    break;
                case 'feather':
                    ctx.beginPath();
                    ctx.moveTo(-15, -15);
                    ctx.bezierCurveTo(-1, -10, 15, 5, 20, 20);
                    ctx.moveTo(-15, -15);
                    ctx.lineTo(-10, -10);
                    ctx.moveTo(-5, -5);
                    ctx.lineTo(0, 0);
                    ctx.moveTo(5, 5);
                    ctx.lineTo(10, 10);
                    ctx.moveTo(15, 15);
                    ctx.lineTo(20, 20);
                    ctx.stroke();
                    break;
                case 'cloud':
                    ctx.setLineDash([2, 2]);
                    ctx.beginPath();
                    ctx.arc(0, 0, 15, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    break;
                case 'pinpoint':
                    ctx.beginPath();
                    ctx.arc(0, 0, 3, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                case 'group_pinpoints':
                    ctx.beginPath(); ctx.arc(-6, -6, 2, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(6, 6, 2, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(6, -6, 2, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(-6, 6, 2, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(0, 0, 2, 0, Math.PI*2); ctx.fill();
                    break;
                case 'knot':
                    ctx.beginPath();
                    ctx.arc(0, 0, 12, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                case 'cavity':
                    ctx.strokeRect(-12, -12, 24, 24);
                    ctx.beginPath();
                    ctx.moveTo(-12, -12); ctx.lineTo(12, 12);
                    ctx.moveTo(-4, -12); ctx.lineTo(12, 4);
                    ctx.moveTo(-12, -4); ctx.lineTo(4, 12);
                    ctx.stroke();
                    break;
                case 'chip':
                    ctx.beginPath();
                    ctx.moveTo(-15, -10);
                    ctx.quadraticCurveTo(0, 15, 15, -10);
                    ctx.closePath();
                    ctx.stroke();
                    break;
                case 'laser_drill':
                    ctx.beginPath();
                    ctx.arc(0, 0, 12, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(0, 0, 3, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                case 'bearded_girdle':
                    ctx.beginPath();
                    for(let i=-15; i<=15; i+=5) {
                        ctx.moveTo(i, -5);
                        ctx.lineTo(i, 5);
                    }
                    ctx.stroke();
                    break;
            }

            // Draw Selection Box (Local Space)
            if (isSelected) {
                ctx.strokeStyle = '#3498db';
                ctx.lineWidth = 2 / this.scale; 
                ctx.setLineDash([5, 3]);
                ctx.strokeRect(-this.width/2 - 5, -this.height/2 - 5, this.width + 10, this.height + 10);
                ctx.setLineDash([]);
            }

            ctx.restore();

            // Draw Handles (World Space)
            if (isSelected) {
                this.drawHandles(ctx);
            }
        }

        drawHandles(ctx) {
            const coords = this.getHandleCoords();
            
            ctx.fillStyle = '#3498db';
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;

            // Corners
            ['tl', 'tr', 'br', 'bl'].forEach(pos => {
                const p = coords[pos];
                ctx.beginPath();
                ctx.rect(p.x - 5, p.y - 5, 10, 10);
                ctx.fill();
                ctx.stroke();
            });

            // Rotation Handle
            const rot = coords.rot;
            const top = coords.topMid;
            
            ctx.beginPath();
            ctx.moveTo(top.x, top.y);
            ctx.lineTo(rot.x, rot.y);
            ctx.strokeStyle = '#3498db';
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(rot.x, rot.y, 6, 0, Math.PI*2);
            ctx.fill();
            ctx.stroke();
        }

        getHandleCoords() {
            const halfW = (this.width/2 + 5) * this.scale;
            const halfH = (this.height/2 + 5) * this.scale;
            const rad = this.rotation * Math.PI / 180;
            const cos = Math.cos(rad);
            const sin = Math.sin(rad);

            const transform = (ox, oy) => ({
                x: ox * cos - oy * sin + this.x,
                y: ox * sin + oy * cos + this.y
            });

            return {
                tl: transform(-halfW, -halfH),
                tr: transform(halfW, -halfH),
                br: transform(halfW, halfH),
                bl: transform(-halfW, halfH),
                rot: transform(0, -halfH - 25),
                topMid: transform(0, -halfH)
            };
        }

        getHitAction(mx, my) {
            const coords = this.getHandleCoords();
            const hitDist = 20; // Hit tolerance

            // Check Rotation Handle
            if (Math.hypot(mx - coords.rot.x, my - coords.rot.y) < hitDist) return 'rotate';

            // Check Corners
            if (Math.hypot(mx - coords.tl.x, my - coords.tl.y) < hitDist) return 'resize';
            if (Math.hypot(mx - coords.tr.x, my - coords.tr.y) < hitDist) return 'resize';
            if (Math.hypot(mx - coords.bl.x, my - coords.bl.y) < hitDist) return 'resize';
            if (Math.hypot(mx - coords.br.x, my - coords.br.y) < hitDist) return 'resize';

            // Check Body
            const dist = Math.hypot(mx - this.x, my - this.y);
            if (dist < (this.width / 2) * this.scale + 10) return 'move';

            return null;
        }

        isHit(mx, my) {
            return this.getHitAction(mx, my) !== null;
        }
    }

    // --- 3. Main Render Loop ---
    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        drawDiamondTemplate();

        inclusions.forEach(inc => {
            inc.draw(ctx, inc === selectedInclusion);
        });
    }

    // --- 4. Event Listeners ---

    // HTML5 Drag and Drop (From Palette to Canvas)
    const draggables = document.querySelectorAll('.symbol-item');
    draggables.forEach(elem => {
        elem.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('type', elem.dataset.type);
        });
        // Click to add (Mobile friendly alternative to drag)
        elem.addEventListener('click', (e) => {
            addInclusion(canvas.width / 2, canvas.height / 2, elem.dataset.type);
        });
    });

    canvas.addEventListener('dragover', (e) => {
        e.preventDefault(); // Allow drop
    });

    canvas.addEventListener('drop', (e) => {
        e.preventDefault();
        const type = e.dataTransfer.getData('type');
        
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;

        addInclusion(x, y, type);
    });

    function addInclusion(x, y, type) {
        const newInclusion = new Inclusion(x, y, type);
        inclusions.push(newInclusion);
        selectInclusion(newInclusion);
        render();
    }

    // Helper for coordinates (handles CSS scaling)
    function getPointerPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        const clientX = (e.touches && e.touches.length) ? e.touches[0].clientX : e.clientX;
        const clientY = (e.touches && e.touches.length) ? e.touches[0].clientY : e.clientY;

        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    // Canvas Mouse Interaction (Select & Move)
    function handlePointerDown(e) {
        if (e.type === 'touchstart') e.preventDefault(); // Prevent scroll

        // Handle Pinch Start
        if (e.touches && e.touches.length === 2) {
            dragAction = 'pinch';
            potentialDeselect = false;
            const p1 = getPointerPos({touches: [e.touches[0]]});
            const p2 = getPointerPos({touches: [e.touches[1]]});
            
            initialPinchDist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
            initialPinchAngle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
            
            if (selectedInclusion) {
                dragStart.scale = selectedInclusion.scale;
                dragStart.rotation = selectedInclusion.rotation;
                dragStart.centerX = (p1.x + p2.x) / 2;
                dragStart.centerY = (p1.y + p2.y) / 2;
                dragStart.incX = selectedInclusion.x;
                dragStart.incY = selectedInclusion.y;
            }
            return;
        }

        const {x: mx, y: my} = getPointerPos(e);

        // If we have a selected inclusion, check its handles first
        if (selectedInclusion) {
            const action = selectedInclusion.getHitAction(mx, my);
            if (action) {
                dragAction = action;
                dragStart.x = mx;
                dragStart.y = my;
                dragStart.val = (action === 'rotate') ? selectedInclusion.rotation : selectedInclusion.scale;
                
                if (action === 'resize') {
                    dragStart.dist = Math.hypot(mx - selectedInclusion.x, my - selectedInclusion.y);
                } else if (action === 'move') {
                    dragStart.offsetX = mx - selectedInclusion.x;
                    dragStart.offsetY = my - selectedInclusion.y;
                }
                potentialDeselect = false;
                render();
                return;
            }
        }

        // Check hits on other items
        for (let i = inclusions.length - 1; i >= 0; i--) {
            if (inclusions[i].getHitAction(mx, my)) {
                selectInclusion(inclusions[i]);
                dragAction = 'move';
                dragStart.offsetX = mx - inclusions[i].x;
                dragStart.offsetY = my - inclusions[i].y;
                potentialDeselect = false;
                render();
                return;
            }
        }

        // Hit nothing
        if (e.type === 'mousedown') {
            deselectAll();
            render();
        } else {
            potentialDeselect = true;
        }
    }

    function handlePointerMove(e) {
        if (e.type === 'touchmove') e.preventDefault();
        if (!dragAction || !selectedInclusion) return;

        // Handle Pinch Move
        if (dragAction === 'pinch' && e.touches && e.touches.length === 2) {
            const p1 = getPointerPos({touches: [e.touches[0]]});
            const p2 = getPointerPos({touches: [e.touches[1]]});
            
            const currentDist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
            const currentAngle = Math.atan2(p2.y - p1.y, p2.x - p1.x);

            const currentCenterX = (p1.x + p2.x) / 2;
            const currentCenterY = (p1.y + p2.y) / 2;

            const scaleFactor = currentDist / initialPinchDist;
            const angleDiff = (currentAngle - initialPinchAngle) * 180 / Math.PI;

            selectedInclusion.scale = Math.max(0.1, dragStart.scale * scaleFactor);
            selectedInclusion.rotation = dragStart.rotation + angleDiff;
            
            selectedInclusion.x = dragStart.incX + (currentCenterX - dragStart.centerX);
            selectedInclusion.y = dragStart.incY + (currentCenterY - dragStart.centerY);
            
            updateControls();
            render();
            return;
        }

        const {x: mx, y: my} = getPointerPos(e);

        if (dragAction === 'move') {
            selectedInclusion.x = mx - dragStart.offsetX;
            selectedInclusion.y = my - dragStart.offsetY;
        } else if (dragAction === 'rotate') {
            const angle = Math.atan2(my - selectedInclusion.y, mx - selectedInclusion.x);
            const angleDeg = angle * 180 / Math.PI;
            // Handle is at -90 degrees relative to center, so add 90
            selectedInclusion.rotation = angleDeg + 90;
        } else if (dragAction === 'resize') {
            const currentDist = Math.hypot(mx - selectedInclusion.x, my - selectedInclusion.y);
            const scaleFactor = currentDist / dragStart.dist;
            selectedInclusion.scale = Math.max(0.1, dragStart.val * scaleFactor);
        }
        
        updateControls();
        render();
    }

    function handlePointerUp(e) {
        if (potentialDeselect) {
            deselectAll();
            render();
            potentialDeselect = false;
        }
        dragAction = null;
    }

    function updateControls() {
        if (selectedInclusion) {
            let rot = Math.round(selectedInclusion.rotation % 360);
            if (rot < 0) rot += 360;
            rotationInput.value = rot;
            scaleInput.value = selectedInclusion.scale;
            rotValDisplay.textContent = rot;
            scaleValDisplay.textContent = selectedInclusion.scale.toFixed(1);
        }
    }

    // Mouse Events
    canvas.addEventListener('mousedown', handlePointerDown);
    canvas.addEventListener('mousemove', handlePointerMove);
    canvas.addEventListener('mouseup', handlePointerUp);
    // Touch Events
    canvas.addEventListener('touchstart', handlePointerDown, {passive: false});
    canvas.addEventListener('touchmove', handlePointerMove, {passive: false});
    canvas.addEventListener('touchend', handlePointerUp);

    // Controls Logic
    function selectInclusion(inc) {
        selectedInclusion = inc;
        
        // Enable controls
        rotationInput.disabled = false;
        scaleInput.disabled = false;
        deleteBtn.disabled = false;

        // Update UI values
        rotationInput.value = inc.rotation;
        scaleInput.value = inc.scale;
        rotValDisplay.textContent = Math.round(inc.rotation);
        scaleValDisplay.textContent = inc.scale.toFixed(1);
    }

    function deselectAll() {
        selectedInclusion = null;
        rotationInput.disabled = true;
        scaleInput.disabled = true;
        deleteBtn.disabled = true;
        
        rotationInput.value = 0;
        scaleInput.value = 1;
        rotValDisplay.textContent = "0";
        scaleValDisplay.textContent = "1.0";
    }

    rotationInput.addEventListener('input', (e) => {
        if (selectedInclusion) {
            selectedInclusion.rotation = parseInt(e.target.value);
            rotValDisplay.textContent = selectedInclusion.rotation;
            render();
        }
    });

    scaleInput.addEventListener('input', (e) => {
        if (selectedInclusion) {
            selectedInclusion.scale = parseFloat(e.target.value);
            scaleValDisplay.textContent = selectedInclusion.scale.toFixed(1);
            render();
        }
    });

    deleteBtn.addEventListener('click', () => {
        if (selectedInclusion) {
            inclusions = inclusions.filter(i => i !== selectedInclusion);
            deselectAll();
            render();
        }
    });

    clearBtn.addEventListener('click', () => {
        if(confirm("Clear all inclusions?")) {
            inclusions = [];
            deselectAll();
            render();
        }
    });

    saveBtn.addEventListener('click', () => {
        // Create a temporary link to download the canvas as image
        const link = document.createElement('a');
        link.download = 'diamond-grading-report.png';
        link.href = canvas.toDataURL();
        link.click();
    });

    // Initial Draw
    loadAndDrawTemplate();

</script>

</body>
</html>
